# agt.toml — Post-install manifest
# Declares setup rules that agt executes after skill installation.

# Copy static context files to ~/.agents/
[[setup.copy]]
from = "static"
to = "~/.agents"
strategy = "merge"  # merge: skip existing files, replace: overwrite

# Personas are installed selectively with `agt persona install`.
# Keep ~/.agents/personas as a curated active set instead of copying
# the whole persona library on every post-install run.
